# 项目配置文件

# OpenClaw 相关配置
openclaw:
  model:
    provider: "aliyun"  # aliyun | deepseek | openai
    model_id: "glm-5"   # 模型ID
  feishu:
    app_id: ""          # 飞书应用ID
    app_secret: ""      # 飞书应用密钥
  gateway:
    url: "ws://127.0.0.1:18789"
    token: ""           # Gateway 认证 token（如需要）

# JWT 配置（用户认证）
jwt:
  secret: "change-me-in-production-use-random-string"
  algorithm: "HS256"
  expire_hours: 24

# 数据库配置
database:
  url: "sqlite+aiosqlite:///./data/suni.db"

# RAG 配置
rag:
  # Hugging Face 镜像（中国大陆用户请取消注释）
  # hf_endpoint: "https://hf-mirror.com"
  
  # Embedding 配置
  embedding:
    model: "BAAI/bge-large-zh-v1.5"
    # 国内镜像用户改为：
    # model: "hf-mirror/BAAI/bge-large-zh-v1.5"
    device: "cpu"       # cpu | cuda
  
  # Reranker 配置  
  reranker:
    model: "BAAI/bge-reranker-large"
    device: "cpu"
  
  # 检索配置
  retrieval:
    top_k: 10                    # 初始召回数量
    rerank_top_k: 5              # 重排后返回数量
    similarity_threshold: 0.5    # 相似度阈值
  
  # 文档切分配置
  chunking:
    chunk_size: 500              # 切分大小（字符）
    chunk_overlap: 50            # 切分重叠
  
  # 向量数据库
  vector_db:
    type: "chroma"
    persist_directory: "./data/chroma"

# 文档路径
documents:
  input_dir: "./docs"            # 输入文档目录
  supported_formats:
    - ".txt"
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".xlsx"
    - ".xls"

# 内部问题识别关键词（用于判断是否走RAG）
internal_keywords:
  - "内部"
  - "公司"
  - "我们"
  - "企业"
  - "制度"
  - "流程"
  - "规定"
  - "政策"
  - "员工"
  - "部门"

# 用户知识库配置
knowledge:
  upload_dir: "./data/user_docs"
  allowed_extensions:
    - ".txt"
    - ".pdf"
    - ".docx"
    - ".xlsx"
    - ".md"
  max_file_size_mb: 50

# 服务配置
server:
  host: "0.0.0.0"
  port: 3000
  debug: true